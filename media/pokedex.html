<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokédex</title>
<style>
/* ── Themes ── */
[data-theme="light"] {
  --bg:        #f4f4f4;
  --surface:   #ffffff;
  --border:    #e0e0e0;
  --text:      #222222;
  --subtext:   #888888;
  --header-bg: #cc0000;
  --header-border: #a00000;
  --search-bg: #ffffff;
  --input-border: #cccccc;
  --card-hover-border: #bbbbbb;
  --results-text: #666666;
  --footer-bg: #333333;
  --footer-text: #aaaaaa;
  --toggle-bg: #dddddd;
  --toggle-knob: #ffffff;
  --shadow: rgba(0,0,0,0.12);
  --btn-reset-active: #cc0000;
  --btn-reset-text: #ffffff;
}
[data-theme="dark"] {
  --bg:        #121212;
  --surface:   #1e1e1e;
  --border:    #2e2e2e;
  --text:      #eeeeee;
  --subtext:   #888888;
  --header-bg: #8b0000;
  --header-border: #6a0000;
  --search-bg: #1e1e1e;
  --input-border: #3a3a3a;
  --card-hover-border: #555555;
  --results-text: #888888;
  --footer-bg: #0a0a0a;
  --footer-text: #666666;
  --toggle-bg: #cc0000;
  --toggle-knob: #ffffff;
  --shadow: rgba(0,0,0,0.5);
  --btn-reset-active: #ff3333;
  --btn-reset-text: #ffffff;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background .25s, color .25s;
}

/* ── Navbar ── */
#navbar {
  background: var(--header-bg);
  display: flex; align-items: center;
  padding: 0 20px; height: 54px; gap: 14px;
  border-bottom: 3px solid var(--header-border);
  position: sticky; top: 0; z-index: 200;
}
.nav-ball svg { width:34px; height:34px; flex-shrink:0; }
.nav-title { color:#fff; font-size:1.3rem; font-weight:800; letter-spacing:.5px; }

/* Dark mode toggle */
.dm-toggle {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.dm-label { color: rgba(255,255,255,0.85); font-size: 0.8rem; font-weight:600; }
.dm-switch {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--toggle-bg);
  position: relative; transition: background .25s;
  flex-shrink: 0;
}
.dm-switch::after {
  content: "";
  position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--toggle-knob);
  transition: transform .25s;
}
[data-theme="dark"] .dm-switch::after { transform: translateX(18px); }

/* ── Page header ── */
#page-header {
  background: var(--header-bg);
  padding: 16px 20px 22px;
  text-align: center;
  border-bottom: 3px solid var(--header-border);
}
#page-header h1 { color:#fff; font-size:1.8rem; font-weight:800; letter-spacing:1px; text-shadow:0 2px 4px rgba(0,0,0,.3); }
#page-header p  { color:rgba(255,255,255,.8); font-size:.9rem; margin-top:5px; }

/* ── Search ── */
#search-section {
  background: var(--search-bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  transition: background .25s;
}
.search-inner {
  max-width: 780px; margin: 0 auto;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.search-box { position:relative; flex:1 1 240px; min-width:180px; }
.search-box .ico {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:var(--subtext); pointer-events:none; width:17px; height:17px;
}
.search-box input {
  width:100%; padding:10px 14px 10px 40px;
  border: 2px solid var(--input-border);
  border-radius:4px; font-size:.95rem; font-family:inherit;
  background: var(--surface); color: var(--text);
  outline:none; transition: border-color .2s, background .25s, color .25s;
}
.search-box input:focus { border-color:#cc0000; }
.filter-sel {
  padding: 9px 12px;
  border: 2px solid var(--input-border);
  border-radius:4px; font-family:inherit; font-size:.88rem;
  background: var(--surface); color: var(--text);
  cursor:pointer; outline:none;
  transition: border-color .2s, background .25s, color .25s;
}
.filter-sel:focus { border-color:#cc0000; }

/* Reset Button */
.btn-reset {
  padding: 9px 16px;
  border: 2px solid var(--input-border);
  border-radius: 4px;
  font-family: inherit; font-size: .88rem; font-weight: 600;
  background: var(--surface); color: var(--subtext);
  cursor: not-allowed; outline: none; opacity: 0.5;
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-reset.active {
  background: var(--btn-reset-active);
  border-color: var(--btn-reset-active);
  color: var(--btn-reset-text);
  cursor: pointer; opacity: 1;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.btn-reset.active:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Type pills */
#type-row {
  max-width:780px; margin:10px auto 0;
  display:flex; flex-wrap:wrap; gap:5px; align-items:center;
}
#type-row .lbl { font-size:.8rem; font-weight:600; color:var(--subtext); margin-right:4px; }
.tpill {
  padding: 4px 12px; border-radius:3px; border:2px solid transparent;
  font-size:.75rem; font-weight:700; cursor:pointer; color:#fff;
  text-transform:capitalize; opacity:.55;
  transition: opacity .15s, transform .1s;
}
.tpill:hover { opacity:.85; }
.tpill.on { opacity:1; border-color:rgba(0,0,0,.35); transform:scale(1.07); box-shadow:0 2px 6px rgba(0,0,0,.25); }

/* ── Results bar ── */
#res-bar {
  max-width:900px; margin:14px auto 6px;
  padding: 0 18px;
  font-size:.82rem; color:var(--results-text); font-weight:600;
}

/* ── Virtual scroll container ── */
#scroll-wrap {
  max-width:900px; margin:0 auto; padding:0 16px 48px;
  position: relative;
}
/* spacer that holds the full scroll height */
#spacer { width:100%; pointer-events:none; }
/* visible window */
#visible-grid {
  position: absolute; left:16px; right:16px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media(max-width:600px) { #visible-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:380px) { #visible-grid { grid-template-columns: 1fr; } }

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:6px;
  padding: 12px 8px 14px;
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer;
  transition: box-shadow .15s, transform .15s, border-color .15s, background .25s;
  overflow:hidden; position:relative;
}
.card:hover {
  box-shadow: 0 5px 18px var(--shadow);
  transform: translateY(-3px);
  border-color: var(--card-hover-border);
}
.card-num  { font-size:.7rem; font-weight:700; color:var(--subtext); align-self:flex-start; }
.card-img  { width:110px; height:110px; object-fit:contain; margin:6px 0; transition:transform .2s; }
.card:hover .card-img { transform:scale(1.08); }
.card-name { font-size:.88rem; font-weight:700; text-align:center; margin-top:6px; color:var(--text); }
.card-types { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; justify-content:center; }
.tbadge {
  font-size:.68rem; font-weight:700; padding:2px 9px;
  border-radius:3px; color:#fff; text-transform:capitalize;
}

/* ── No results ── */
#no-res {
  display:none; text-align:center; padding:60px 20px;
  color:var(--subtext); font-size:1rem; font-weight:600;
}

footer {
  background:var(--footer-bg); color:var(--footer-text);
  text-align:center; padding:18px; font-size:.75rem;
  transition: background .25s;
}
footer strong { color:#fff; }
</style>
</head>

const TC          = {"normal":"#9FA19F","fire":"#E62829","water":"#2980EF","electric":"#FAC000","grass":"#3FA129","ice":"#3DCEF3","fighting":"#FF8000","poison":"#9141CB","ground":"#915121","flying":"#81B9EF","psychic":"#EF4179","bug":"#91A119","rock":"#AFA981","ghost":"#704170","dragon":"#5060E1","dark":"#624D4E","steel":"#60A1B8","fairy":"#EF70EF"};
const TDE         = {"normal":"Normal","fire":"Feuer","water":"Wasser","electric":"Elektro","grass":"Pflanze","ice":"Eis","fighting":"Kampf","poison":"Gift","ground":"Boden","flying":"Flug","psychic":"Psycho","bug":"Käfer","rock":"Gestein","ghost":"Geist","dragon":"Drache","dark":"Unlicht","steel":"Stahl","fairy":"Fee"};
const TORDER      = ["normal","fire","water","electric","grass","ice","fighting","poison","ground","flying","psychic","bug","rock","ghost","dragon","dark","steel","fairy"];
const GEN         = {"1":[1,151],"2":[152,201]};

/* ── Dark mode ── */
const root = document.documentElement;
let dark = localStorage.getItem("dm") === "1";
function applyTheme() {
  root.setAttribute("data-theme", dark ? "dark" : "light");
  document.getElementById("dm-label").textContent = dark ? "Light Mode" : "Dark Mode";
  localStorage.setItem("dm", dark ? "1" : "0");
}
applyTheme();
document.getElementById("dm-toggle").addEventListener("click", () => { dark = !dark; applyTheme(); });

/* ── Type pills ── */
const typeRow = document.getElementById("type-row");
TORDER.forEach(t => {
  const b = document.createElement("button");
  b.className = "tpill"; b.dataset.t = t;
  b.textContent = TDE[t]||t; b.style.background = TC[t]||"#999";
  b.addEventListener("click", () => {
    activeType = activeType===t ? "" : t;
    document.querySelectorAll(".tpill").forEach(x => x.classList.toggle("on", x.dataset.t===activeType));
    rebuild();
  });
  typeRow.appendChild(b);
});

/* ── State ── */
let activeType="", activeGen="", activeSort="id", searchQ="";
let filtered = [];

const inputQ = document.getElementById("q");
const selectGen = document.getElementById("gen");
const selectSrt = document.getElementById("srt");
const btnReset = document.getElementById("btn-reset");

inputQ.addEventListener("input",  e => { searchQ=e.target.value; rebuild(); });
selectGen.addEventListener("change",e => { activeGen=e.target.value; rebuild(); });
selectSrt.addEventListener("change",e => { activeSort=e.target.value; rebuild(); });

// Reset-Knopf Logik
btnReset.addEventListener("click", () => {
  if (!btnReset.classList.contains("active")) return;
  
  // States zurücksetzen
  searchQ = "";
  activeGen = "";
  activeType = "";
  
  // DOM-Elemente zurücksetzen
  inputQ.value = "";
  selectGen.value = "";
  document.querySelectorAll(".tpill").forEach(x => x.classList.remove("on"));
  
  rebuild();
});

function rebuild() {
  const q = searchQ.trim().toLowerCase();
  
  // Prüfen, ob irgendein Filter aktiv ist, um den Reset-Knopf zu steuern
  if (q || activeGen || activeType) {
    btnReset.classList.add("active");
  } else {
    btnReset.classList.remove("active");
  }

  filtered = DATA.filter(p => {
    if (q) {
      const ok = p.d.toLowerCase().includes(q) || p.e.toLowerCase().includes(q)
               || String(p.i).includes(q) || String(p.i).padStart(4,"0").includes(q);
      if (!ok) return false;
    }
    if (activeType && !p.t.includes(activeType)) return false;
    if (activeGen) {
      const [lo,hi]=GEN[activeGen];
      if (p.i<lo||p.i>hi) return false;
    }
    return true;
  });
  if (activeSort==="name") filtered.sort((a,b)=>a.d.localeCompare(b.d,"de"));
  else                      filtered.sort((a,b)=>a.i-b.i);

  document.getElementById("res-bar").textContent =
    filtered.length===DATA.length ? `${DATA.length} Pokémon`
    : `${filtered.length} von ${DATA.length} Pokémon`;
  document.getElementById("no-res").style.display = filtered.length ? "none" : "block";

  vScroll.reset();
}

/* ── Virtual scroll ── */
const vScroll = (() => {
  const wrap   = document.getElementById("scroll-wrap");
  const spacer = document.getElementById("spacer");
  const grid   = document.getElementById("visible-grid");

  // card height estimate — recalculated after first render
  let CARD_H   = 220;
  let COLS     = 3;
  let startRow = 0;

  function getCols() {
    const w = wrap.clientWidth;
    if (w < 380) return 1;
    if (w < 600) return 2;
    return 3;
  }

  function cardHTML(p) {
    const c1 = TC[p.t[0]]||"#999";
    const badges = p.t.map(t=>`<span class="tbadge" style="background:${TC[t]||"#999"}">${TDE[t]||t}</span>`).join("");
    const img = p.b
      ? `<img class="card-img" src="${p.b}" alt="${p.d}" loading="lazy">`
      : `<div style="width:110px;height:110px;display:flex;align-items:center;justify-content:center;font-size:2.5rem">❓</div>`;
    return `<div class="card" style="background:linear-gradient(150deg,${c1}1a 0%,var(--surface) 55%)">
      <span class="card-num">#${String(p.i).padStart(4,"0")}</span>
      ${img}
      <span class="card-name">${p.d}</span>
      <div class="card-types">${badges}</div>
    </div>`;
  }

  // How many rows fit in 2× viewport
  function rowsVisible() {
    return Math.ceil((window.innerHeight * 2.5) / CARD_H);
  }

  function render(scrollTop) {
    COLS = getCols();
    const totalRows = Math.ceil(filtered.length / COLS);
    const totalH    = totalRows * (CARD_H + 12);
    spacer.style.height = totalH + "px";

    const firstRow  = Math.max(0, Math.floor(scrollTop / (CARD_H+12)) - 2);
    const lastRow   = Math.min(totalRows-1, firstRow + rowsVisible());

    if (firstRow === startRow && grid.children.length > 0) return; // no change
    startRow = firstRow;

    const firstIdx = firstRow * COLS;
    const lastIdx  = Math.min(filtered.length-1, (lastRow+1)*COLS - 1);

    grid.style.top = (firstRow * (CARD_H+12)) + "px";
    grid.style.gridTemplateColumns = `repeat(${COLS},1fr)`;

    let html = "";
    for (let i=firstIdx; i<=lastIdx; i++) html += cardHTML(filtered[i]);
    grid.innerHTML = html;

    // Calibrate card height from real DOM
    if (grid.firstChild) {
      const rh = grid.firstChild.getBoundingClientRect().height;
      if (rh > 10) CARD_H = rh;
    }
  }

  function reset() {
    startRow = -1;
    wrap.scrollTop = 0;
    window.scrollTo(0,0);
    render(0);
  }

  let ticking = false;
  window.addEventListener("scroll", () => {
    if (!ticking) { requestAnimationFrame(() => { render(window.scrollY); ticking=false; }); ticking=true; }
  });
  window.addEventListener("resize", () => render(window.scrollY));

  return { reset };
})();

rebuild();
</script>

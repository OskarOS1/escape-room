<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escape Room – Abistreich</title>
<style>
:root {
  --bg: #f4f6f4;
  --panel: #ffffff;
  --card: #ffffff;
  --accent: #3a8f3a;
  --accent2: #2d7a2d;
  --navy: #1a3a6b;
  --navy2: #122d56;
  --text: #111111;
  --muted: #666666;
  --border: #5aaa5a;
  --border-light: #e0e0e0;
  --success: #2d8a2d;
  --radius: 0px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}


/* ── LOGO ── */
#school-logo {
  height: clamp(28px, 4vw, 36px);
  width: auto;
  opacity: 0.92;
}

/* ── TOP BAR ── */
#top-bar {
  background: #ffffff;
  border-bottom: 3px solid var(--accent);
  padding: clamp(8px, 1.5vw, 10px) clamp(14px, 3vw, 24px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
#game-title {
  font-size: clamp(12px, 1.8vw, 15px);
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--navy);
  text-transform: uppercase;
}
#timer-wrap { display: flex; align-items: center; gap: 10px; }
#timer-label {
  font-size: clamp(9px, 1.3vw, 11px);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
#timer {
  font-size: clamp(20px, 3.2vw, 28px);
  font-weight: 700;
  font-family: monospace;
  color: var(--navy);
  letter-spacing: 3px;
  min-width: 80px;
  background: #f0f4ff;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1.5px solid #c0cce8;
}

/* ── MAIN LAYOUT ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ── PUZZLE AREA (left) ── */
#puzzle-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: clamp(10px, 2vw, 20px);
  gap: clamp(8px, 1.5vw, 14px);
  min-width: 0;
}

#puzzle-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 6px;
}
#puzzle-title {
  font-size: clamp(18px, 2.8vw, 26px);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: 0px;
}
#puzzle-counter {
  font-size: clamp(11px, 1.6vw, 13px);
  color: #ffffff;
  background: var(--success);
  border: 2px solid var(--accent2);
  padding: 5px 14px 5px 8px;
  border-radius: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
#puzzle-counter .counter-dot {
  width: clamp(18px, 2.4vw, 22px);
  height: clamp(18px, 2.4vw, 22px);
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(11px, 1.5vw, 13px);
  font-weight: 900;
  flex-shrink: 0;
}

#puzzle-card {
  background: var(--card);
  border: 1px solid #e8e8e8;
  border-radius: 0px;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

#puzzle-content {
  flex: 1;
  overflow-y: auto;
  padding: clamp(12px, 2.5vw, 20px) clamp(14px, 4vw, 32px) clamp(10px, 2vw, 12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(10px, 2vw, 16px);
  min-height: 0;
}

#answer-bar {
  padding: clamp(8px, 1.5vw, 10px) clamp(14px, 3vw, 24px);
  background: #f8f8f8;
  border-top: 1px solid #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

#puzzle-question {
  font-size: clamp(18px, 2.6vw, 24px);
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  font-weight: 500;
  width: 100%;
  text-align: center;
}

/* Media area */
#puzzle-media {
  border-radius: 0px;
  background: transparent;
  border: none;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  justify-content: center;
  gap: 12px;
  flex: 1 1 auto;
  /* Garantierte Mindesthöhe fürs Rätselbild: schrumpft auf engen
     Bildschirmen (z.B. Schul-Laptops 1366×768) NIE auf fast nichts.
     Reicht der Platz nicht, scrollt stattdessen #puzzle-content.
     Das Bild ist das wichtigste Element auf dem Bildschirm, deshalb
     bekommt es hier bewusst großzügig Raum. */
  min-height: clamp(160px, 32vh, 420px);
  width: 100%;
  color: var(--muted);
  font-size: 13px;
}
.media-item {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1 1 0;
  min-width: 0;
  min-height: 0;
}
#puzzle-media img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  display: block;
  object-fit: contain;
}
#puzzle-media video {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
}
#puzzle-media audio {
  width: 100%;
}

/* ── MUSIK-RÄTSEL: Note + Klaviertasten ── */
.music-puzzle-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(16px, 3vw, 28px);
  width: 100%;
  height: 100%;
  margin: 0 auto;
  text-align: center;
}
.melody-note-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(90px, 14vw, 140px);
  height: clamp(90px, 14vw, 140px);
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  border: none;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(26,58,107,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
  margin: 0 auto;
}
.melody-note-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 22px rgba(26,58,107,0.45);
}
.melody-note-btn:active { transform: scale(0.97); }
.melody-note-btn svg { width: 52%; height: 52%; }
.melody-note-label {
  font-size: clamp(14px, 1.8vw, 17px);
  color: var(--navy);
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
}
/* WICHTIG: Selector hier bewusst "#puzzle-media .melody-audio-player" (nicht nur
   .melody-audio-player) — sonst gewinnt die generische Regel "#puzzle-media audio"
   weiter oben per CSS-Spezifität (ID schlägt Klasse) und die feste Breite/Höhe greift
   NICHT. Das war der Grund, warum der Melodie-Player auf dem iPad winzig und kaum
   zum Wischen breit genug dargestellt wurde. */
#puzzle-media .melody-audio-player {
  width: min(480px, 92%);
  max-width: 100%;
  height: 46px;
  margin-top: 0;
}
.piano-wrap {
  position: relative;
  display: flex;
  height: clamp(100px, 16vw, 180px);
  width: 100%;
  max-width: 700px;
  justify-content: center;
  margin: 0 auto;
}
.piano-key {
  position: relative;
  border: 1.5px solid #999;
  border-radius: 0 0 8px 8px;
  cursor: pointer;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: clamp(6px, 1vw, 10px);
  font-size: clamp(15px, 2vw, 20px);
  font-weight: 900;
  font-family: monospace;
  transition: background 0.1s, transform 0.05s;
  user-select: none;
}
.piano-key.white {
  width: clamp(42px, 6vw, 70px);
  height: clamp(100px, 16vw, 180px);
  background: #ffffff;
  color: #222;
  z-index: 1;
}
.piano-key.white:hover { background: #f0f0f0; }
.piano-key.white:active, .piano-key.white.playing {
  background: #e0eaff;
  transform: translateY(2px);
}
.piano-key.black {
  width: clamp(26px, 3.6vw, 42px);
  height: clamp(62px, 10vw, 112px);
  background: #1a1a1a;
  color: #fff;
  position: absolute;
  top: 0;
  z-index: 2;
  border-radius: 0 0 5px 5px;
  margin: 0;
  font-size: clamp(12px, 1.6vw, 16px);
}
.piano-key.black:hover { background: #333; }
.piano-key.black:active, .piano-key.black.playing {
  background: #444;
  transform: translateY(2px);
}

/* Answer input – am unteren Rand */
#answer-row {
  display: none;
}
#answer-input {
  width: min(280px, 70vw);
  background: #ffffff;
  border: 1.5px solid #aaaaaa;
  border-radius: 6px;
  color: var(--text);
  font-size: clamp(15px, 2vw, 16px);
  padding: clamp(9px, 1.5vw, 8px) 14px;
  outline: none;
  transition: border 0.2s;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-family: Arial, monospace;
  font-weight: 700;
  text-align: center;
}
#answer-input:focus {
  border-color: #888888;
}
#answer-input:focus {
  border-color: var(--accent);
}
#answer-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
#check-btn {
  background: var(--accent);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: clamp(18px, 2.4vw, 20px);
  font-weight: 700;
  width: clamp(42px, 5vw, 46px);
  height: clamp(42px, 5vw, 46px);
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#check-btn:hover { background: var(--accent2); }
#check-btn:active { transform: scale(0.95); }

#feedback {
  font-size: clamp(13px, 1.8vw, 14px);
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: normal;
  text-align: center;
}

/* Navigation bar */
#nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 8px;
}
.nav-btn {
  background: var(--navy);
  border: none;
  border-radius: 20px;
  color: #fff;
  font-size: clamp(13px, 1.8vw, 14px);
  padding: clamp(10px, 1.6vw, 9px) clamp(16px, 3vw, 22px);
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 700;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.nav-btn:hover { background: var(--navy2); }
#nav-center {
  font-size: clamp(11px, 1.5vw, 13px);
  color: var(--muted);
  letter-spacing: 0.5px;
  font-weight: 500;
  white-space: nowrap;
}

/* ── SIDEBAR (right) ──────────────────────────────────────────
   Einklappbar: Das Rätselbild ist das Wichtigste auf dem Bildschirm,
   die Sidebar darf bei Bedarf zugunsten von mehr Platz fürs Bild und
   die Frage verschwinden (Toggle-Button "#sidebar-toggle-btn" oben
   in der Kopfzeile). body.sidebar-collapsed klappt sie auf normal
   breiten Bildschirmen (Laptop/iPad quer) komplett ein. ────────── */
#sidebar {
  width: clamp(190px, 19vw, 250px);
  background: var(--panel);
  border-left: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: clamp(10px, 1.6vw, 16px);
  gap: 0;
  overflow-y: hidden;
  overflow-x: hidden;
  flex-shrink: 0;
  transition: width 0.22s ease, padding 0.22s ease, opacity 0.18s ease, border-color 0.22s ease;

  background: #ffffff;
}
body.sidebar-collapsed #sidebar {
  width: 0;
  min-width: 0;
  padding-left: 0;
  padding-right: 0;
  opacity: 0;
  border-left-color: transparent;
  pointer-events: none;
}

.sidebar-section-label {
  font-size: clamp(9px, 1.2vw, 10px);
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  border-bottom: 1.5px solid var(--border);
  padding-bottom: 8px;
  font-weight: 700;
}

#puzzle-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding-bottom: 8px;
}
#sidebar-bottom {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border-top: 1.5px solid var(--border);
  padding-top: 12px;
  margin-top: 8px;
}

.puzzle-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: clamp(8px, 1.3vw, 9px) 10px;
  border-radius: 0px;
  border: 1px solid #e0e0e0;
  border-left: 3px solid transparent;
  background: #ffffff;
  cursor: pointer;
  transition: border 0.2s, background 0.2s;
  font-size: clamp(11px, 1.4vw, 12px);
  user-select: none;
}
.puzzle-item:hover { border-left-color: var(--accent); background: #f5fff5; }
.puzzle-item.active { border-left-color: var(--navy); border-color: #d0d8f0; background: #f0f4ff; }
.puzzle-item.solved { border-left-color: var(--success); border-color: #c0e0c0; background: #f0fff0; }

.puzzle-dot {
  width: clamp(26px, 3.2vw, 30px);
  height: clamp(26px, 3.2vw, 30px);
  border-radius: 50%;
  background: #7BC14F;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(12px, 1.5vw, 13px);
  font-weight: 900;
  flex-shrink: 0;
  transition: all 0.3s;
  color: #ffffff;
}
.puzzle-item.solved .puzzle-dot { background: var(--success); color: #fff; }
.puzzle-item.active .puzzle-dot { background: var(--navy); color: #fff; }

.puzzle-item-name {
  flex: 1;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
  font-weight: 500;
}
.puzzle-item.solved .puzzle-item-name { color: var(--success); font-weight: 700; }
.puzzle-item.active .puzzle-item-name { color: var(--navy); font-weight: 700; }

/* Solution word */
#solution-section { flex-shrink: 0; }
#solution-word {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.sol-letter {
  width: clamp(24px, 3vw, 30px);
  height: clamp(28px, 3.4vw, 34px);
  background: #ffffff;
  border: 2px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(13px, 1.7vw, 15px);
  font-weight: 700;
  color: var(--muted);
  transition: all 0.4s;
  font-family: monospace;
}
.sol-letter.revealed {
  background: rgba(45,138,45,0.12);
  border-color: var(--success);
  color: var(--success);
}

/* Final input */
#final-input-section {
  display: none;
  flex-direction: column;
  gap: 8px;
  border-top: 1.5px solid var(--border);
  padding-top: 12px;
  flex-shrink: 0;
}
#final-input-section.visible { display: flex; }
#final-label {
  font-size: clamp(9px, 1.2vw, 10px);
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  font-weight: 700;
}
#final-input {
  background: #ffffff;
  border: 2px solid var(--accent);
  border-radius: 8px;
  color: var(--text);
  font-size: clamp(13px, 1.6vw, 14px);
  padding: clamp(8px, 1.3vw, 9px) 10px;
  outline: none;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: monospace;
  transition: border 0.2s;
  font-weight: 700;
  text-align: center;
}
#final-input:focus { border-color: var(--navy); }
#final-btn {
  background: var(--accent);
  border: none;
  border-radius: 20px;
  color: #fff;
  font-size: clamp(12px, 1.5vw, 13px);
  font-weight: 700;
  padding: clamp(9px, 1.4vw, 10px);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: background 0.2s;
}
#final-btn:hover { background: var(--accent2); }
#final-feedback {
  font-size: clamp(11px, 1.4vw, 12px);
  min-height: 16px;
  color: #c0392b;
  font-weight: 700;
}

/* ── SIDEBAR LOGO ── */
#sidebar-logo-wrap {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1.5px solid var(--border);
  display: flex;
  justify-content: center;
  align-items: center;
}
#sidebar-logo {
  width: clamp(56px, 7vw, 80px);
  height: auto;
  opacity: 0.85;
}

/* ── WIN OVERLAY ── */
#win-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(26,58,107,0.92);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: clamp(14px, 2.5vw, 20px);
  z-index: 100;
  text-align: center;
  padding: clamp(20px, 4vw, 40px);
}
#win-overlay.show { display: flex; }
#win-emoji { font-size: clamp(44px, 7vw, 64px); }
#win-title {
  font-size: clamp(26px, 4.5vw, 40px);
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 4px;
  text-transform: uppercase;
  border-bottom: 3px solid var(--accent);
  padding-bottom: 12px;
}
#win-time {
  font-size: clamp(18px, 3vw, 26px);
  color: #ffffff;
  font-family: monospace;
  background: rgba(255,255,255,0.15);
  padding: 10px 28px;
  border-radius: 6px;
}
#win-sub {
  font-size: clamp(14px, 2vw, 16px);
  color: rgba(255,255,255,0.8);
  max-width: 420px;
  line-height: 1.7;
}
#reset-btn {
  margin-top: 10px;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.4);
  border-radius: 8px;
  color: #fff;
  font-size: clamp(12px, 1.6vw, 13px);
  padding: clamp(9px, 1.5vw, 10px) clamp(18px, 3vw, 24px);
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
}
#reset-btn:hover { background: rgba(255,255,255,0.25); }

/* ── TITELSEITE ── */
#title-screen-1, #title-screen-2 {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  cursor: pointer;
}
#title-screen-1.hidden, #title-screen-2.hidden { display: none; }
#title-image-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40%;
  height: 40%;
}
#title-image-wrap img {
  max-width: 90%;
  max-height: 90%;
  width: auto;
  height: auto;
  object-fit: contain;
}

/* ── ÜBERSICHTSSEITE (Seite 3) ── */
#title-screen-3 {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 199;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#title-screen-3.hidden { display: none; }
#overview-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 10px;
  padding: 14px;
  overflow: hidden;
}
.overview-cell {
  background: var(--card);
  border: 2px solid var(--border-light);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
  position: relative;
}
.overview-cell:hover {
  border-color: var(--accent);
  transform: scale(1.02);
  box-shadow: 0 4px 14px rgba(58,143,58,0.18);
  z-index: 2;
}
.overview-cell:active { transform: scale(0.98); }
.overview-cell img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.overview-cell-placeholder {
  width: 100%;
  height: 100%;
  background: #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 3vw, 28px);
  color: #aaa;
}
.overview-cell-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(26,58,107,0.82);
  color: #fff;
  font-size: clamp(10px, 1.4vw, 11px);
  font-weight: 700;
  text-align: center;
  padding: 4px 6px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* ── GRUPPEN in Sidebar ── */

  border-radius: 2px;

  font-size: 18px;
  padding: 4px 10px;
  border-radius: 20px;

  line-height: 1;
  color: var(--navy);

#sidebar-toggle-btn {

  font-size: 16px;
  padding: 4px 10px;

  z-index: 60;

<script>
/* ── SPIELLOGIK ── */

/* Titelseite initialisieren */
if (TITEL_BILD) {
  const imgWrap = document.getElementById('title-image-wrap');
  document.getElementById('title-image').src = TITEL_BILD;
  imgWrap.style.display = 'flex';
}
if (TITEL_AUDIO) {
  document.getElementById('title-audio-src').src = TITEL_AUDIO;
  document.getElementById('title-audio').load();
}

/* Klick 1: Audio starten, zu Bildschirm 2 wechseln */
document.getElementById('title-screen-1').addEventListener('click', () => {
  if (TITEL_AUDIO) {
    document.getElementById('title-audio').play().catch(() => {});
  }
  document.getElementById('title-screen-1').classList.add('hidden');
  document.getElementById('title-screen-2').classList.remove('hidden');
});

/* Klick 2: Zu Übersichtsseite wechseln, Audio stoppen */
document.getElementById('title-screen-2').addEventListener('click', () => {
  document.getElementById('title-screen-2').classList.add('hidden');
  const audio = document.getElementById('title-audio');
  audio.pause();
  audio.currentTime = 0;
  buildOverviewGrid();
  document.getElementById('title-screen-3').classList.remove('hidden');
});

/* Übersichtsseite aufbauen */
function buildOverviewGrid() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = '';
  UEBERSICHT_BILDER.forEach((item, i) => {
    const cell = document.createElement('div');
    cell.className = 'overview-cell';

    if (item.bild) {
      const img = document.createElement('img');
      img.src = item.bild;
      img.alt = item.label;
      cell.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'overview-cell-placeholder';
      ph.textContent = '?';
      cell.appendChild(ph);
    }

    const lbl = document.createElement('div');
    lbl.className = 'overview-cell-label';
    lbl.textContent = item.label;
    cell.appendChild(lbl);

    /* Klick: Übersicht verlassen → Timer starten → passendes Rätsel öffnen */
    cell.addEventListener('click', () => {
      leaveOverview(i);
    });

    grid.appendChild(cell);
  });
}

/* Übersicht verlassen: Timer starten, Hintergrundmusik starten, Spiel anzeigen */
function leaveOverview(overviewIndex) {
  document.getElementById('title-screen-3').classList.add('hidden');

  if (MAIN_AUDIO) {
    mainAudio = new Audio(MAIN_AUDIO);
    mainAudio.loop = true;
    mainAudio.volume = 0.4;
    mainAudio.play().catch(e => console.log("Audio-Autoplay blockiert:", e));
    if (document.getElementById('volume-btn')) {
      document.getElementById('volume-btn').style.display = 'block';
    }
  }

  /* Timer sofort starten */
  startTimer();

  /* Versuche das Rätsel zu finden, das zum angeklickten Bild gehört */
  const label = UEBERSICHT_BILDER[overviewIndex] ? UEBERSICHT_BILDER[overviewIndex].label : null;
  if (label) {
    const idx = RAETSEL.findIndex(r => (r.gruppe || r.titel) === label || r.titel.trim() === label.trim());
    if (idx !== -1) {
      current = idx;
      renderPuzzle(current);
      buildSidebar();
      return;
    }
  }
  /* Fallback: erstes Rätsel */
  renderPuzzle(0);
  buildSidebar();
}

/* Gewinn-Overlay Texte setzen */
document.getElementById('win-emoji').textContent = GEWINN_EMOJI;
document.getElementById('win-title').textContent = GEWINN_TITEL;
document.getElementById('win-sub').innerHTML = GEWINN_TEXT;

document.getElementById('game-title').textContent = SPIELTITEL;
document.getElementById('nav-total').textContent = RAETSEL.length;
document.getElementById('solved-total').textContent = RAETSEL.length;

let current = 0;
let solved = new Array(RAETSEL.length).fill(false);
let seconds = 0;
let timerInterval = null;
let running = false;
let mainAudio = null;
let isMuted = false;

/* Timer */
function startTimer() {
  if (running) return;
  running = true;
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);

}

function stopTimer() {
  clearInterval(timerInterval);
  running = false;
}

function formatTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return m + ':' + s;
}

/* Gruppen berechnen */
function getGruppen() {
  const map = {};
  RAETSEL.forEach((r, i) => {
    const g = r.gruppe || r.titel;
    if (!map[g]) map[g] = [];
    map[g].push(i);
  });
  return map;
}

function gruppeKomplett(indices) {
  return indices.every(i => solved[i]);
}

/* Rätsel rendern */
function renderPuzzle(idx) {
  const r = RAETSEL[idx];

  // Gruppen-Subinfo (z.B. "Flaggen-Rätsel · 2 von 5")
  const gruppen = getGruppen();
  const gruppeIndices = gruppen[r.gruppe] || [idx];
  const posInGroup = gruppeIndices.indexOf(idx) + 1;
  const totalInGroup = gruppeIndices.length;
  const subInfo = document.getElementById('puzzle-sub-info');
  if (totalInGroup > 1) {
    subInfo.textContent = r.gruppe + ' · ' + posInGroup + ' von ' + totalInGroup;
    subInfo.style.display = 'block';
  } else {
    subInfo.style.display = 'none';
  }

  document.getElementById('puzzle-title').textContent = r.titel;
  document.getElementById('solved-count').textContent = solved.filter(Boolean).length;
  document.getElementById('solved-total').textContent = RAETSEL.length;
  document.getElementById('nav-num').textContent = idx + 1;
  document.getElementById('puzzle-question').innerHTML = r.text.replace(/\n/g, '<br>');

  /* Medium */
  const mediaEl = document.getElementById('puzzle-media');

  function renderMediaItem(src) {
    const url = src.toLowerCase();
    const ext = url.split('?')[0].split('.').pop();
    const isImage = ['jpg','jpeg','png','gif','webp','svg'].includes(ext)
                 || url.includes('flagcdn') || url.includes('imgur')
                 || url.includes('wikimedia') || url.includes('upload')
                 || src.startsWith('data:image');
    const isVideo = ['mp4','webm'].includes(ext);
    const isAudio = ['mp3','wav','m4a','ogg'].includes(ext);

    const wrap = document.createElement('div');
    wrap.className = 'media-item';

    if (isImage) {
      wrap.innerHTML = '<img src="' + src + '" alt="R\u00e4tsel-Bild" style="max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain;" />';
    } else if (isVideo) {
      wrap.innerHTML = '<video controls style="width:100%"><source src="' + src + '"></video>';
    } else if (isAudio) {
      wrap.innerHTML = '<audio controls style="padding:16px;width:100%"><source src="' + src + '"></audio>';
    } else {
      wrap.innerHTML = '<img src="' + src + '" alt="R\u00e4tsel-Bild" style="max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain;" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'\u274c Medium konnte nicht geladen werden.\'" />';
    }
    return wrap;
  }

  /* ── Erkennt ob dieses Rätsel das Musik-Rätsel ist (Melodie + Tonleiter) ── */
  function isMusicPuzzle(sources) {
    if (!Array.isArray(sources)) return false;
    return sources.some(s => /melodie\.(mp3|wav|m4a|ogg)$/i.test(s));
  }

  /* ── Note-Icon (SVG) für die Hauptmelodie ── */
  const NOTE_SVG = '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">'
    + '<ellipse cx="28" cy="76" rx="15" ry="11" fill="#ffffff" transform="rotate(-18 28 76)"/>'
    + '<rect x="40" y="14" width="5" height="62" fill="#ffffff"/>'
    + '<path d="M45 14 C 70 18, 78 32, 70 44 C 64 32, 54 26, 45 30 Z" fill="#ffffff"/>'
    + '</svg>';

  /* ── Klaviertasten-Layout für 9 Töne: C, C#, D, E, Ekurz, F, G, H, Hkurz
       Wir bauen eine durchgehende Tastatur C D E F G H (= H wie deutsche Notation, also B)
       und ordnen Sonderfälle (CLang, Ekurz, Hkurz) als zusätzliche helle Tasten mit Sublabel zu. ── */
  function buildPianoKeys(sources, melodySrc) {
    // Tonzuordnung: Dateiname-Stamm -> {label, type: white/black, note}
    const noteMap = {
      'C':      { label: 'C',  type: 'white' },
      'CLang':  { label: 'C',  type: 'white', sub: 'lang' },
      'D':      { label: 'D',  type: 'white' },
      'E':      { label: 'E',  type: 'white' },
      'Ekurz':  { label: 'E',  type: 'white', sub: 'kurz' },
      'F':      { label: 'F',  type: 'white' },
      'G':      { label: 'G',  type: 'white' },
      'H':      { label: 'H',  type: 'white' },
      'Hkurz':  { label: 'H',  type: 'white', sub: 'kurz' }
    };

    const keys = sources.filter(s => s !== melodySrc).map(src => {
      const stem = src.split('/').pop().replace(/\.(mp3|wav|m4a|ogg)$/i, '');
      const info = noteMap[stem] || { label: stem, type: 'white' };
      return { src, ...info };
    });

    return keys;
  }

  function renderMusicPuzzle(sources) {
    const melodySrc = sources.find(s => /melodie\.(mp3|wav|m4a|ogg)$/i.test(s));
    const keys = buildPianoKeys(sources, melodySrc);

    const wrap = document.createElement('div');
    wrap.className = 'music-puzzle-wrap';

    /* Große Note = Hauptmelodie */
    const noteCol = document.createElement('div');
    noteCol.style.display = 'flex';
    noteCol.style.flexDirection = 'column';
    noteCol.style.alignItems = 'center';
    noteCol.style.gap = '8px';

    const noteBtn = document.createElement('button');
    noteBtn.className = 'melody-note-btn';
    noteBtn.type = 'button';
    noteBtn.innerHTML = NOTE_SVG;
    noteBtn.title = 'Hauptmelodie abspielen';
    noteCol.appendChild(noteBtn);

    const noteLabel = document.createElement('div');
    noteLabel.className = 'melody-note-label';
    noteLabel.textContent = '';
    noteCol.appendChild(noteLabel);

    /* Echter Audio-Player mit Fortschrittsleiste zum gezielten Springen */
    const melodyAudio = document.createElement('audio');
    melodyAudio.className = 'melody-audio-player';
    melodyAudio.controls = true;
    melodyAudio.preload = 'metadata';
    const src = document.createElement('source');
    src.src = melodySrc;
    melodyAudio.appendChild(src);
    noteCol.appendChild(melodyAudio);

    noteBtn.addEventListener('click', () => {
      melodyAudio.currentTime = 0;
      melodyAudio.play().catch(() => {});
    });

    wrap.appendChild(noteCol);

    /* Klaviatur = einzelne Töne */
    const pianoWrap = document.createElement('div');
    pianoWrap.className = 'piano-wrap';
    pianoWrap.style.width = 'auto';

    let whiteIndex = 0;
    keys.forEach(k => {
      const keyEl = document.createElement('div');
      const keyAudio = new Audio(k.src);

      if (k.type === 'white') {
        keyEl.className = 'piano-key white';
        let labelHtml = k.label;
        if (k.sub) labelHtml += '<span style="display:block;font-size:11px;font-weight:700;opacity:0.75;">' + k.sub + '</span>';
        keyEl.innerHTML = labelHtml;
        whiteIndex++;
      } else {
        keyEl.className = 'piano-key black';
        keyEl.textContent = k.label;
      }

      keyEl.addEventListener('click', () => {
        keyAudio.currentTime = 0;
        keyAudio.play().catch(() => {});
        keyEl.classList.add('playing');
        setTimeout(() => keyEl.classList.remove('playing'), 180);
      });

      pianoWrap.appendChild(keyEl);
    });

    wrap.appendChild(pianoWrap);
    return wrap;
  }

  mediaEl.innerHTML = '';
  if (r.media) {
    const sources = Array.isArray(r.media) ? r.media : [r.media];
    if (isMusicPuzzle(sources)) {
      mediaEl.appendChild(renderMusicPuzzle(sources));
    } else {
      sources.forEach(src => mediaEl.appendChild(renderMediaItem(src)));
    }
    mediaEl.style.display = 'flex';
  } else {
    mediaEl.style.display = 'none';
  }

  /* Eingabefeld */
  const inp = document.getElementById('answer-input');
  const fb = document.getElementById('feedback');
  const hint = document.getElementById('buchstabe-hint');
  inp.value = '';
  inp.disabled = solved[idx];

  const gruppeVoll = gruppeKomplett(gruppeIndices);

  if (solved[idx]) {
    if (gruppeVoll) {
      fb.textContent = '✅ Bereits gelöst! Buchstabe "' + r.buchstabe + '" ist freigeschaltet.';
    } else {
      fb.textContent = '✅ Bereits gelöst!';
    }
    fb.style.color = 'var(--success)';
    hint.textContent = '';
  } else {
    fb.textContent = '';
    if (totalInGroup > 1 && !gruppeVoll) {
      const noch = gruppeIndices.filter(i => !solved[i]).length;
      hint.textContent = '';
    } else {
      hint.textContent = '';
    }
  }

  /* Sidebar Highlights */
  document.querySelectorAll('.puzzle-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  if (!solved[idx]) inp.focus();
}

/* Sidebar aufbauen */
function buildSidebar() {
  const list = document.getElementById('puzzle-list');
  list.innerHTML = '';
  const gruppen = getGruppen();
  const collapsedState = {};

  // Gruppen-Collapse-Status aus bestehenden Elementen retten
  list.querySelectorAll('.gruppe-header').forEach(el => {
    const g = el.dataset.gruppe;
    collapsedState[g] = el.nextElementSibling?.classList.contains('collapsed');
  });

  Object.entries(gruppen).forEach(([gruppenName, indices]) => {
    const done = gruppeKomplett(indices);
    const geloest = indices.filter(i => solved[i]).length;
    const total = indices.length;

    // Gruppen-Header
    const header = document.createElement('div');
    header.className = 'gruppe-header';
    header.dataset.gruppe = gruppenName;

    const label = document.createElement('span');
    label.textContent = gruppenName;

    const badge = document.createElement('span');
    badge.className = 'gruppe-badge' + (done ? ' done' : '');
    badge.textContent = geloest + '/' + total;

    header.appendChild(label);
    header.appendChild(badge);

    // Fortschrittsbalken
    const progress = document.createElement('div');
    progress.className = 'gruppe-progress';
    const fill = document.createElement('div');
    fill.className = 'gruppe-progress-fill';
    fill.style.width = Math.round((geloest / total) * 100) + '%';
    progress.appendChild(fill);

    // Rätsel-Items Container
    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'gruppe-items';

    indices.forEach((rIdx, posInGroup) => {
      const r = RAETSEL[rIdx];
      const item = document.createElement('div');
      item.className = 'puzzle-item' +
        (solved[rIdx] ? ' solved' : '') +
        (rIdx === current ? ' active' : '');

      const dot = document.createElement('div');
      dot.className = 'puzzle-dot';
      dot.textContent = solved[rIdx] ? '✓' : (posInGroup + 1);

      const name = document.createElement('div');
      name.className = 'puzzle-item-name';
      name.textContent = total > 1 ? (posInGroup + 1) + '. ' + r.titel : r.titel;

      item.appendChild(dot);
      item.appendChild(name);
      item.addEventListener('click', () => {
        current = rIdx;
        renderPuzzle(rIdx);
        buildSidebar();
      });

      itemsWrap.appendChild(item);
    });

    // Collapse-Toggle
    header.addEventListener('click', () => {
      itemsWrap.classList.toggle('collapsed');
      progress.style.display = itemsWrap.classList.contains('collapsed') ? 'none' : '';
    });

    list.appendChild(header);
    list.appendChild(progress);
    list.appendChild(itemsWrap);
  });

  /* Lösungswort — nur Buchstaben von komplett gelösten Gruppen */
  const sw = document.getElementById('solution-word');
  sw.innerHTML = '';
  const gruppen2 = getGruppen();
  const seen = {};
  RAETSEL.forEach((r, i) => {
    const g = r.gruppe || r.titel;
    if (seen[g]) return;
    seen[g] = true;
    const indices = gruppen2[g];
    const done = gruppeKomplett(indices);
    const div = document.createElement('div');
    div.className = 'sol-letter' + (done ? ' revealed' : '');
    div.textContent = done ? r.buchstabe : '?';
    div.title = done ? 'Gruppe ' + g + ': "' + r.buchstabe + '"' : g + ' – noch nicht vollständig gelöst';
    sw.appendChild(div);
  });

  /* Finale Eingabe zeigen wenn alle gelöst */
  const allDone = solved.every(Boolean);
  const finalSection = document.getElementById('final-input-section');
  if (allDone) {
    finalSection.classList.add('visible');
    document.getElementById('final-input').focus();
  } else {
    finalSection.classList.remove('visible');
  }
}

/* Antwort prüfen */
function checkAnswer() {
  const r = RAETSEL[current];
  if (solved[current]) return;

  const val = document.getElementById('answer-input').value.trim().toUpperCase();
  const correct = r.loesung.trim().toUpperCase();
  const fb = document.getElementById('feedback');

  if (val === correct) {
    solved[current] = true;
    const gruppen = getGruppen();
    const gruppeIndices = gruppen[r.gruppe] || [current];
    const gruppeVoll = gruppeKomplett(gruppeIndices);
    const hint = document.getElementById('buchstabe-hint');

    if (gruppeVoll) {
      fb.textContent = '✅ Richtig! Gruppe komplett – Buchstabe "' + r.buchstabe + '" wurde freigeschaltet! 🎉';
    } else {
      const noch = gruppeIndices.filter(i => !solved[i]).length;
      fb.textContent = '✅ Richtig! Noch ' + noch + ' Rätsel in dieser Gruppe bis zum Buchstaben "' + r.buchstabe + '".';
    }
    fb.style.color = 'var(--success)';
    hint.textContent = '';
    document.getElementById('answer-input').disabled = true;
    buildSidebar();

    /* Automatisch zum nächsten ungelösten Rätsel springen (ab aktuellem) */
    let next = -1;
    for (let i = current + 1; i < RAETSEL.length; i++) {
      if (!solved[i]) { next = i; break; }
    }
    if (next === -1) {
      for (let i = 0; i < current; i++) {
        if (!solved[i]) { next = i; break; }
      }
    }
    if (next !== -1) {
      setTimeout(() => {
        current = next;
        renderPuzzle(current);
        buildSidebar();
      }, 1200);
    }
  } else {
    fb.textContent = '❌ Leider falsch – versuch es nochmal!';
    fb.style.color = 'var(--accent)';
    document.getElementById('answer-input').select();
  }
}

/* Finales Lösungswort prüfen */
function checkFinal() {

  const val = document.getElementById('final-input').value.trim().toUpperCase();
  const correct = FINALES_LOESUNGSWORT.trim().toUpperCase();
  const fb = document.getElementById('final-feedback');

  if (val === correct) {
    stopTimer();
    document.getElementById('win-time').textContent = '🕐 Eure Zeit: ' + formatTime(seconds);
    document.getElementById('win-overlay').classList.add('show');
     if (mainAudio) {
     mainAudio.pause();
    }
     if (TITEL_AUDIO) {
    document.getElementById('title-audio').play().catch(() => {});
    }
  } else {
    fb.textContent = '❌ Falsches Lösungswort!';
    document.getElementById('final-input').style.borderColor = 'var(--accent)';
    setTimeout(() => {
      document.getElementById('final-input').style.borderColor = 'var(--gold)';
      fb.textContent = '';
    }, 1500);
  }
}

/* Neu starten */
function resetGame() {
  solved = new Array(RAETSEL.length).fill(false);
  seconds = 0;
  current = 0;
  stopTimer();
  running = false;
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('final-input').value = '';
  document.getElementById('final-feedback').textContent = '';
  renderPuzzle(0);
  buildSidebar();
}

/* Event Listener */
document.getElementById('check-btn').addEventListener('click', checkAnswer);
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});
document.getElementById('prev-btn').addEventListener('click', () => {
  current = (current - 1 + RAETSEL.length) % RAETSEL.length;
  renderPuzzle(current);
  buildSidebar();
});
document.getElementById('next-btn').addEventListener('click', () => {
  current = (current + 1) % RAETSEL.length;
  renderPuzzle(current);
  buildSidebar();
});
document.getElementById('final-btn').addEventListener('click', checkFinal);
document.getElementById('final-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkFinal();
});
document.getElementById('reset-btn').addEventListener('click', resetGame);

/* Tastatur-Shortcuts: Pfeiltasten für Navigation (wenn nicht im Eingabefeld) */
document.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('answer-input')) return;
  if (document.activeElement === document.getElementById('final-input')) return;
  if (e.key === 'ArrowLeft') {
    current = (current - 1 + RAETSEL.length) % RAETSEL.length;
    renderPuzzle(current);
    buildSidebar();
  }
  if (e.key === 'ArrowRight') {
    current = (current + 1) % RAETSEL.length;
    renderPuzzle(current);
    buildSidebar();
  }
});
document.getElementById('volume-btn').addEventListener('click', () => {
  if (!mainAudio) return;
  isMuted = !isMuted;
  mainAudio.muted = isMuted;
  document.getElementById('volume-btn').textContent = isMuted ? "🔇" : "🔊";
});

/* Sidebar ein-/ausklappen — auf breiten Bildschirmen klappt sie ein
   (mehr Platz fürs Rätselbild), auf schmalen Bildschirmen (Handy)
   fährt sie stattdessen als Schublade über den Inhalt. */
const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
const sidebarBackdrop = document.getElementById('sidebar-backdrop');

function isNarrowViewport() {
  return window.innerWidth <= 700;
}
function sidebarIsVisible() {
  return isNarrowViewport()
    ? document.body.classList.contains('sidebar-open')
    : !document.body.classList.contains('sidebar-collapsed');
}
function updateSidebarToggleUI() {
  const visible = sidebarIsVisible();
  sidebarToggleBtn.classList.toggle('active', !visible);
  sidebarToggleBtn.title = visible ? 'Rätsel-Liste ausblenden' : 'Rätsel-Liste einblenden';
}
sidebarToggleBtn.addEventListener('click', () => {
  if (isNarrowViewport()) {
    document.body.classList.toggle('sidebar-open');
  } else {
    document.body.classList.toggle('sidebar-collapsed');
  }
  updateSidebarToggleUI();
});
sidebarBackdrop.addEventListener('click', () => {
  document.body.classList.remove('sidebar-open');
  updateSidebarToggleUI();
});
window.addEventListener('resize', updateSidebarToggleUI);
updateSidebarToggleUI();

/* Init */
renderPuzzle(0);
buildSidebar();
</script>
